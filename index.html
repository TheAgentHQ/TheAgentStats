<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autonomous Social System — Live Telemetry</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080b;
  --bg-raised: #0e0e13;
  --bg-card: #111116;
  --bg-card-hover: #15151b;
  --bg-bar: #1a1a22;
  --border: #1c1c25;
  --border-bright: #282835;
  --text: #b8b8c4;
  --text-dim: #5a5a6a;
  --text-bright: #eaeaf0;
  --accent: #00e5a0;
  --accent-dim: rgba(0, 229, 160, 0.15);
  --accent-faint: rgba(0, 229, 160, 0.06);
  --red: #ff4d6a;
  --amber: #ffb347;
  --blue: #4da3ff;
  --purple: #c084fc;
  --pink: #f472b6;
  --orange: #fb923c;
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --sans: 'Space Grotesk', system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.1;
  pointer-events: none;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 32px 80px;
  position: relative;
}

/* === HEADER === */
.header {
  margin-bottom: 56px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent), 0 0 24px var(--accent-dim);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.header-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
}

h1 {
  font-family: var(--sans);
  font-size: 32px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--text-dim);
  font-size: 12px;
}
.subtitle span { color: var(--text); }

/* === SECTION HEADERS === */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 56px 0 24px;
}

.section-header::before {
  content: '//';
  color: var(--accent);
  font-weight: 700;
  font-size: 14px;
}

.section-title {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border-bright), transparent);
}

/* === HERO STATS (top 3 big numbers) === */
.hero-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.hero-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
}

.hero-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.hero-value {
  font-family: var(--sans);
  font-size: 48px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -2px;
}

.hero-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 8px;
}
.hero-sub span { color: var(--text); }

/* === SECONDARY STATS (smaller row) === */
.secondary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 18px 16px;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--border-bright); }

.stat-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--sans);
  font-size: 24px;
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1;
  letter-spacing: -0.5px;
}

.stat-suffix {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-dim);
  margin-left: 2px;
}

/* === BAR CHART (posts distribution) === */
.chart-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}

.chart-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
}

.chart-title {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 20px;
}

.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bar-label {
  width: 90px;
  font-size: 11px;
  color: var(--text);
  text-align: right;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  flex: 1;
  height: 20px;
  background: var(--bg-bar);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}

.bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(255,255,255,0.3);
}

.bar-value {
  width: 50px;
  font-size: 12px;
  color: var(--text-bright);
  font-weight: 500;
  flex-shrink: 0;
}

/* Donut chart */
.donut-container {
  display: flex;
  align-items: center;
  gap: 32px;
}

.donut-svg {
  width: 140px;
  height: 140px;
  flex-shrink: 0;
}

.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

.legend-label { color: var(--text); flex: 1; }
.legend-value { color: var(--text-bright); font-weight: 500; }

/* === ENGAGEMENT RATE GAUGE === */
.gauge-strip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.gauge-info { flex-shrink: 0; }
.gauge-big {
  font-family: var(--sans);
  font-size: 42px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -1px;
}
.gauge-label-text {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.gauge-track {
  flex: 1;
  height: 6px;
  background: var(--bg-bar);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}

.gauge-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), #00c896);
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 0 10px var(--accent-dim);
}

.gauge-marks {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 9px;
  color: var(--text-dim);
}

.gauge-right { flex-shrink: 0; text-align: right; }
.gauge-detail {
  font-size: 11px;
  color: var(--text-dim);
}
.gauge-detail span { color: var(--text); }

/* === ACCOUNT CARDS === */
.accounts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 16px;
}

.account-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  transition: border-color 0.2s;
}

.account-card:hover { border-color: var(--border-bright); }

.account-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.account-name {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-bright);
}

.niche-badge {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
  font-weight: 500;
  border: 1px solid;
}

.niche-badge.uplifting  { color: #00e5a0; border-color: #00e5a044; background: #00e5a00a; }
.niche-badge.finance    { color: #4da3ff; border-color: #4da3ff44; background: #4da3ff0a; }
.niche-badge.intern     { color: #ffb347; border-color: #ffb34744; background: #ffb3470a; }
.niche-badge.ai         { color: #c084fc; border-color: #c084fc44; background: #c084fc0a; }
.niche-badge.geopolitics{ color: #f472b6; border-color: #f472b644; background: #f472b60a; }
.niche-badge.degen      { color: #fb923c; border-color: #fb923c44; background: #fb923c0a; }
.niche-badge.meme       { color: #facc15; border-color: #facc1544; background: #facc150a; }
.niche-badge.manifest   { color: #a78bfa; border-color: #a78bfa44; background: #a78bfa0a; }
.niche-badge.video      { color: #38bdf8; border-color: #38bdf844; background: #38bdf80a; }
.niche-badge.youtube    { color: #ff4444; border-color: #ff444444; background: #ff44440a; }

/* Mini bar inside account card */
.account-mini-bar {
  margin: 16px 0;
}

.account-mini-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.account-mini-track {
  height: 4px;
  background: var(--bg-bar);
  border-radius: 2px;
  overflow: hidden;
}

.account-mini-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* Account stat row */
.account-stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
}

.account-stat-cell {
  text-align: center;
  padding: 12px 8px;
  background: rgba(255,255,255,0.015);
  border-radius: 4px;
}

.account-stat-value {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1;
}

.account-stat-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 6px;
}

.account-stat-delta {
  font-size: 10px;
  margin-top: 3px;
}
.account-stat-delta.positive { color: var(--accent); }
.account-stat-delta.negative { color: var(--red); }

.account-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
}
.account-footer span { color: var(--text); }

/* === FOOTER === */
.footer {
  margin-top: 72px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text-dim);
}

.footer-left { display: flex; align-items: center; gap: 8px; }
.footer-dot {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.6;
}

/* Loading / Error */
.loading {
  text-align: center;
  padding: 120px 20px;
  color: var(--text-dim);
}

.loading-bar {
  width: 200px;
  height: 2px;
  background: var(--border);
  margin: 16px auto;
  border-radius: 1px;
  overflow: hidden;
}

.loading-bar::after {
  content: '';
  display: block;
  width: 40%;
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  animation: load 1.2s ease-in-out infinite;
}

@keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

.error {
  text-align: center;
  padding: 120px 20px;
  color: var(--red);
  font-size: 12px;
}

/* Responsive */
@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; }
  .chart-section { grid-template-columns: 1fr; }
  .gauge-strip { flex-direction: column; align-items: flex-start; gap: 16px; }
  .gauge-track { width: 100%; }
  .gauge-right { display: none; }
}

@media (max-width: 768px) {
  .container { padding: 24px 16px 60px; }
  h1 { font-size: 24px; }
  .hero-value { font-size: 36px; }
  .secondary-grid { grid-template-columns: repeat(2, 1fr); }
  .accounts-grid { grid-template-columns: 1fr; }
  .footer { flex-direction: column; gap: 8px; text-align: center; }
  .donut-container { flex-direction: column; align-items: center; }
}

@media (max-width: 480px) {
  .secondary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .hero-value { font-size: 30px; }
  .account-stat-row { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-top">
      <div class="status-dot"></div>
      <span class="header-label">System Online</span>
    </div>
    <h1>Autonomous Social Media System</h1>
    <div class="subtitle">Live telemetry from an AI-powered content engine &middot; Updated <span id="updated-time">&mdash;</span></div>
  </header>

  <div id="content">
    <div class="loading">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;">Loading telemetry</div>
      <div class="loading-bar"></div>
    </div>
  </div>
</div>

<script>
(function() {
  const $ = (s, el) => (el || document).querySelector(s);

  const NICHE_COLORS = {
    uplifting: '#00e5a0', finance: '#4da3ff', intern: '#ffb347',
    ai: '#c084fc', geopolitics: '#f472b6', degen: '#fb923c',
    meme: '#facc15', manifest: '#a78bfa', video: '#38bdf8', youtube: '#ff4444'
  };

  function fmt(n) {
    if (n == null) return '\u2014';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 10000) return (n / 1000).toFixed(1) + 'k';
    if (n >= 1000) return n.toLocaleString();
    return String(n);
  }

  function fmtPct(n) { return n == null ? '\u2014' : n.toFixed(1) + '%'; }

  function delta(n) {
    if (n == null || n === 0) return '';
    const cls = n > 0 ? 'positive' : 'negative';
    return `<span class="account-stat-delta ${cls}">${n > 0 ? '+' : ''}${n}</span>`;
  }

  function timeAgo(iso) {
    if (!iso) return '\u2014';
    const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function nicheClass(niche) {
    const n = (niche || '').toLowerCase();
    if (n.includes('uplift') || n.includes('kind')) return 'uplifting';
    if (n.includes('financ') || n.includes('money')) return 'finance';
    if (n.includes('intern') || n.includes('corporate')) return 'intern';
    if (n.includes('ai') || n.includes('agent') || n.includes('auto')) return 'ai';
    if (n.includes('geo') || n.includes('politic')) return 'geopolitics';
    if (n.includes('degen')) return 'degen';
    if (n.includes('crypto') || n.includes('meme')) return 'meme';
    if (n.includes('manifest') || n.includes('lyra') || n.includes('lumira')) return 'manifest';
    if (n.includes('video') || n.includes('curator')) return 'video';
    return '';
  }

  function nicheColor(niche) {
    return NICHE_COLORS[nicheClass(niche)] || '#888';
  }

  // === DONUT CHART SVG ===
  function donutSVG(accounts) {
    const total = accounts.reduce((s, a) => s + (a.posts_total || 0), 0);
    if (total === 0) return '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:40px;">No post data yet</div>';

    const radius = 52, cx = 70, cy = 70, stroke = 16;
    const circ = 2 * Math.PI * radius;
    let offset = 0;
    let paths = '';

    for (const a of accounts) {
      const pct = (a.posts_total || 0) / total;
      if (pct === 0) continue;
      const dash = circ * pct;
      const color = nicheColor(a.niche);
      paths += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-offset}" opacity="0.85"/>`;
      offset += dash;
    }

    const legend = accounts.filter(a => a.posts_total > 0).map(a => {
      const pct = ((a.posts_total / total) * 100).toFixed(0);
      return `<div class="legend-item"><div class="legend-dot" style="background:${nicheColor(a.niche)}"></div><span class="legend-label">${a.niche}</span><span class="legend-value">${fmt(a.posts_total)} (${pct}%)</span></div>`;
    }).join('');

    return `<div class="donut-container">
      <svg class="donut-svg" viewBox="0 0 140 140" style="transform:rotate(-90deg)">
        <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="var(--bg-bar)" stroke-width="${stroke}"/>
        ${paths}
      </svg>
      <div class="donut-legend">${legend}</div>
    </div>`;
  }

  // === HORIZONTAL BAR CHART ===
  function barChart(items, colorFn) {
    const max = Math.max(...items.map(i => i.value), 1);
    return '<div class="bar-chart">' + items.map(item => {
      const pct = Math.max((item.value / max) * 100, 2);
      const color = colorFn ? colorFn(item) : 'var(--accent)';
      return `<div class="bar-row">
        <div class="bar-label">${item.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="bar-value">${fmt(item.value)}</div>
      </div>`;
    }).join('') + '</div>';
  }

  // === RENDER ===
  function render(data) {
    const a = data.aggregate || {};
    const accounts = data.accounts || [];

    $('#updated-time').textContent = timeAgo(data.generated_at);

    let html = '';

    // ---- HERO: 3 big numbers ----
    html += '<div class="hero-grid">';
    html += `<div class="hero-card">
      <div class="hero-label">Total Followers</div>
      <div class="hero-value">${fmt(a.total_followers)}</div>
      <div class="hero-sub">across <span>${a.total_accounts || 0}</span> accounts</div>
    </div>`;
    html += `<div class="hero-card">
      <div class="hero-label">Total Posts</div>
      <div class="hero-value">${fmt(a.total_posts)}</div>
      <div class="hero-sub"><span>${fmt(a.total_threads)}</span> threads included</div>
    </div>`;
    html += `<div class="hero-card">
      <div class="hero-label">Engagement Actions</div>
      <div class="hero-value">${fmt(a.total_engagement_actions)}</div>
      <div class="hero-sub">likes + retweets + replies + bookmarks</div>
    </div>`;
    html += '</div>';

    // ---- SECONDARY ROW ----
    html += '<div class="secondary-grid">';
    html += statCard('Posts Today', fmt(a.posts_today));
    html += statCard('This Week', fmt(a.posts_this_week));
    html += statCard('Drafts Queued', fmt(a.drafts_in_queue));
    html += statCard('Uptime', fmt(a.system_uptime_hours) + '<span class="stat-suffix">h</span>');
    html += '</div>';

    // ---- ENGAGEMENT RATE GAUGE ----
    const rate = a.avg_engagement_rate || 0;
    const gaugeMax = 20;
    const gaugePct = Math.min((rate / gaugeMax) * 100, 100);
    html += `<div class="gauge-strip">
      <div class="gauge-info">
        <div class="gauge-label-text">Avg Engagement Rate</div>
        <div class="gauge-big">${fmtPct(rate)}</div>
      </div>
      <div style="flex:1">
        <div class="gauge-track"><div class="gauge-fill" style="width:${gaugePct}%"></div></div>
        <div class="gauge-marks"><span>0%</span><span>5%</span><span>10%</span><span>15%</span><span>20%+</span></div>
      </div>
      <div class="gauge-right">
        <div class="gauge-detail">Total actions: <span>${fmt(a.total_engagement_actions)}</span></div>
      </div>
    </div>`;

    // ---- CHARTS SECTION ----
    html += '<div class="section-header"><span class="section-title">Distribution</span></div>';
    html += '<div class="chart-section">';

    // Bar chart: followers per account
    html += '<div class="chart-panel">';
    html += '<div class="chart-title">Followers by Account</div>';
    html += barChart(
      accounts.map(ac => ({ label: ac.niche, value: ac.followers || 0, niche: ac.niche })),
      item => nicheColor(item.niche)
    );
    html += '</div>';

    // Donut: post distribution
    html += '<div class="chart-panel">';
    html += '<div class="chart-title">Post Distribution by Niche</div>';
    html += donutSVG(accounts);
    html += '</div>';

    html += '</div>'; // chart-section

    // ---- PER-ACCOUNT TELEMETRY ----
    html += '<div class="section-header"><span class="section-title">Per-Account Telemetry</span></div>';
    html += '<div class="accounts-grid">';
    for (const acct of accounts) {
      html += accountCard(acct, a);
    }
    html += '</div>';

    // ---- YOUTUBE SECTION ----
    const yt = data.youtube || {};
    const ytChannels = yt.channels || [];
    if (ytChannels.length > 0) {
      html += '<div class="section-header"><span class="section-title">YouTube Shorts</span></div>';

      // YouTube hero stats
      html += '<div class="secondary-grid">';
      html += statCard('Channels', fmt(yt.total_channels));
      html += statCard('Videos Uploaded', fmt(yt.total_videos));
      html += statCard('Total Views', fmt(yt.total_views));
      html += statCard('Total Likes', fmt(yt.total_likes));
      html += '</div>';

      // YouTube channel cards
      html += '<div class="accounts-grid" style="margin-top:16px">';
      for (const ch of ytChannels) {
        html += youtubeCard(ch);
      }
      html += '</div>';
    }

    // ---- FOOTER ----
    html += '<footer class="footer">';
    html += '<div class="footer-left"><div class="footer-dot"></div>Fully autonomous &middot; No human intervention</div>';
    html += '<div>AI agents &middot; LLM content &middot; Self-healing infrastructure</div>';
    html += '</footer>';

    $('#content').innerHTML = html;
  }

  function statCard(label, valueHtml) {
    return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${valueHtml}</div></div>`;
  }

  function accountCard(acct, agg) {
    const nc = nicheClass(acct.niche);
    const color = nicheColor(acct.niche);

    // Mini bar: this account's posts as % of total
    const totalPosts = agg.total_posts || 1;
    const postPct = Math.max(((acct.posts_total || 0) / totalPosts) * 100, 2);

    // Engagement rate bar (out of 20%)
    const engPct = Math.min(((acct.avg_engagement_rate || 0) / 20) * 100, 100);

    return `<div class="account-card">
      <div class="account-header">
        <span class="account-name">${acct.label}</span>
        <span class="niche-badge ${nc}">${acct.niche}</span>
      </div>

      <div class="account-stat-row">
        <div class="account-stat-cell">
          <div class="account-stat-value">${fmt(acct.followers)}</div>
          <div class="account-stat-label">Followers</div>
          ${delta(acct.followers_delta_24h)}
        </div>
        <div class="account-stat-cell">
          <div class="account-stat-value">${fmt(acct.posts_total)}</div>
          <div class="account-stat-label">Posts</div>
        </div>
        <div class="account-stat-cell">
          <div class="account-stat-value">${fmt(acct.threads_total)}</div>
          <div class="account-stat-label">Threads</div>
        </div>
      </div>

      <div class="account-mini-bar">
        <div class="account-mini-bar-label">
          <span>Engagement Rate</span>
          <span style="color:var(--text-bright)">${fmtPct(acct.avg_engagement_rate)}</span>
        </div>
        <div class="account-mini-track">
          <div class="account-mini-fill" style="width:${engPct}%;background:${color}"></div>
        </div>
      </div>

      <div class="account-mini-bar" style="margin-top:10px">
        <div class="account-mini-bar-label">
          <span>Share of Output</span>
          <span style="color:var(--text-bright)">${((acct.posts_total || 0) / totalPosts * 100).toFixed(0)}%</span>
        </div>
        <div class="account-mini-track">
          <div class="account-mini-fill" style="width:${postPct}%;background:${color};opacity:0.6"></div>
        </div>
      </div>

      <div class="account-footer">
        <span>Today: <span>${acct.posts_today || 0} posts</span></span>
        <span>Top: <span>${acct.top_post_likes || 0} likes</span></span>
        <span>Queue: <span>${acct.drafts_queued || 0} drafts</span></span>
      </div>
    </div>`;
  }

  function youtubeCard(ch) {
    return `<div class="account-card">
      <div class="account-header">
        <span class="account-name">${ch.label}</span>
        <span class="niche-badge youtube">${ch.niche}</span>
      </div>
      <div class="account-stat-row">
        <div class="account-stat-cell">
          <div class="account-stat-value">${fmt(ch.videos_uploaded)}</div>
          <div class="account-stat-label">Uploaded</div>
        </div>
        <div class="account-stat-cell">
          <div class="account-stat-value">${fmt(ch.total_views)}</div>
          <div class="account-stat-label">Views</div>
        </div>
        <div class="account-stat-cell">
          <div class="account-stat-value">${fmt(ch.total_likes)}</div>
          <div class="account-stat-label">Likes</div>
        </div>
      </div>
      <div class="account-footer">
        <span>Today: <span>${ch.videos_today || 0} videos</span></span>
        <span>Ready: <span>${ch.videos_ready || 0} queued</span></span>
      </div>
    </div>`;
  }

  // Load + auto-refresh
  fetch('stats.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(() => {
      $('#content').innerHTML = `<div class="error">
        <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Telemetry Unavailable</div>
        <div style="color:var(--text-dim);">Data feed offline. Stats will appear when the system pushes its first update.</div>
      </div>`;
    });

  setInterval(() => {
    fetch('stats.json').then(r => r.ok ? r.json() : null).then(d => { if (d) render(d); }).catch(() => {});
  }, 300000);
})();
</script>

</body>
</html>
